<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> 
  <style>
    body { width: 250px; padding: 15px; font-family: Arial; }
    button { width: 100%; padding: 10px; margin-top: 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
    #startBtn { background: #4CAF50; color: white; }
    #stopBtn { background: #f44336; color: white; display: none; }
    .lang-group { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    select { padding: 5px; width: 60%; border-radius: 4px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h3 style="margin-top: 0;">🌐 Trợ lý phiên dịch</h3>
  
  <div class="lang-group">
    <label>Nói:</label>
    <select id="sourceLang">
      <option value="en">Tiếng Anh</option>
      <option value="ja">Tiếng Nhật</option>
      <option value="ko">Tiếng Hàn</option>
      <option value="zh">Tiếng Trung</option>
      <option value="vi">Tiếng Việt</option>
    </select>
  </div>

  <div class="lang-group">
    <label>Dịch ra:</label>
    <select id="targetLang">
      <option value="vi">Tiếng Việt</option>
      <option value="en">Tiếng Anh</option>
      <option value="ja">Tiếng Nhật</option>
    </select>
  </div>

  <button id="startBtn">BẮT ĐẦU DỊCH</button>
  <button id="stopBtn">DỪNG LẠI</button>
  <script src="popup.js"></script>
</body>
</html>
